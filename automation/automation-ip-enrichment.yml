args:
- description: A comma-separated list of IPs to enrich.
  isArray: true
  name: ip_list
  required: true
- auto: PREDEFINED
  defaultValue: "false"
  description: 'Whether to call external integrations for enrichment: - ''true'':
    enrich using enabled external integrations (e.g., VirusTotal (API v3), AlienVault
    OTX v2) and run internal commands. - ''false'': use only existing TIM data and
    run internal commands; skip external integrations. If the ''brands'' argument
    is provided, this flag is ignored and enrichment/internal commands will run only
    on the brands provided.'
  name: external_enrichment
  predefined:
  - "true"
  - "false"
- auto: PREDEFINED
  defaultValue: "false"
  description: Retrieve a human-readable entry for each command; if false, only the
    final result is summarized and errors are suppressed.
  name: verbose
  predefined:
  - "true"
  - "false"
- description: "A list of integration brands to run enrichment against.  \nExample:
    `\"VirusTotal (API v3), AlienVault OTX v2\"`.\n- If provided, only the selected
    brands are used.\n- If left empty, the script runs enrichment on all enabled integrations,\n
    \ depending on the `external_enrichment` flag.\n- In order to run get-endpoint-data
    add Core to the brands list.\n- In order to run core-get-IP-analytics-prevalence,
    add Cortex Core - IR to the brands list.\nTo see the available brands for the
    `ip` command, run: `!ProvidesCommand command=ip`.\n"
  isArray: true
  name: brands
- auto: PREDEFINED
  defaultValue: "false"
  description: "When set to true, the output includes an `AdditionalFields` object\nfor
    each of the indicator result.  \n`AdditionalFields` contains all fields returned
    by TIM or the integrations\nthat are not part of the standard output keys: `Address`,
    `DetectionEngines`, \n`PositiveDetections`, `Score`, and `Brand`.  \nWhen set
    to false, only the standard keys are returned.\n"
  name: additional_fields
  predefined:
  - "true"
  - "false"
