args:
- description: "Accepts a list of indicators to enrich.\n- From CLI: Provide a comma-separated
    list.  \n  If an indicator contains a comma, wrap the indicators in a JSON array.
    \ \n  Example: \"[\\\"https://example.com/search?tags=red,yellow,green\\\", \\\"https://example2.com\\\"]\".\n-
    From Context: Pass JSON arrays directly, without modification.\n"
  isArray: true
  name: indicator_list
- description: Free text to be parsed for indicators. The script will run !extractIndicators
    to retrieve the underlying indicators within the text.
  name: text
- auto: PREDEFINED
  defaultValue: "false"
  description: 'Whether to call external integrations for enrichment: - ''true'':
    enrich using enabled external integrations (e.g., VirusTotal (API v3), AlienVault
    OTX v2) and run internal commands. - ''false'': use only existing TIM data and
    run internal commands; skip external integrations. If the ''brands'' argument
    is provided, this flag is ignored and enrichment/internal commands will run only
    on the brands provided.'
  name: external_enrichment
  predefined:
  - "true"
  - "false"
- description: "A comma separated list of integration brands to run enrichment against.
    \ \nExample: `\"VirusTotal (API v3), AlienVault OTX v2\"`.\n- If provided, only
    the selected brands are used. Specifying brands will force enable external_enrichment.\n-
    If left empty, the script runs enrichment on all enabled integrations.\n"
  isArray: true
  name: brands
- auto: PREDEFINED
  defaultValue: "false"
  description: "When set to true, the output for each enrichment command  includes
    an `AdditionalFields` object for each of the indicator results.  \n`AdditionalFields`
    contains all fields returned by TIM or the integrations\nthat are not part of
    the standard output keys: `Address`, `DetectionEngines`, \n`PositiveDetections`,
    `Score`, and `Brand`.  \nWhen set to false, only the standard keys are returned.\n"
  name: additional_fields
  predefined:
  - "true"
  - "false"
- auto: PREDEFINED
  defaultValue: "false"
  description: If true, will also append the underlying enrichment command outputs
    to the context. (For backwards compatibility).
  name: raw_context
  predefined:
  - "true"
  - "false"
- auto: PREDEFINED
  defaultValue: "false"
  description: 'By default, the script enforces a 100 indicator limit to maintain
    performance. If more than 100 unique indicators are found, the script will stop
    and return an error. Set this argument to true to bypass this limit and process
    all found indicators. Note: Bypassing the limit is not recommended as it may impact
    performance.'
  name: ignore_indicator_limit
  predefined:
  - "true"
  - "false"
comment: 'Enriches indicators from a provided list or a block of free text. This script
  detects the indicator type and runs the correct underlying enrichment script. Currently
  supports: IP, URL, Domain, CVE, and File.'
commonfields:
  id: indicator-enrichment
  version: -1
contentitemexportablefields:
  contentitemfields:
    definitionid: ""
    fromServerVersion: 6.10.0
    isoverridable: false
    itemVersion: 1.3.17
    packID: AggregatedScripts
    packName: Aggregated Scripts
    packPropagationLabels:
    - all
    prevname: ""
    propagationLabels: []
    toServerVersion: ""
