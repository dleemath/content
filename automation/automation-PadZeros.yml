args:
- default: true
  description: String to pad with zeros.
  name: value
  required: true
- defaultValue: "0"
  description: The desired length of the string. The value specified in the "value"
    argument will be padded with zeros until the string reaches this length.
  name: length
  required: true
comment: Adds zeros (0) to the beginning of the string, until the string reaches the
  specified length.
commonfields:
  id: PadZeros
  version: -1
contentitemexportablefields:
  contentitemfields:
    definitionid: ""
    fromServerVersion: 5.0.0
    isoverridable: false
    itemVersion: 1.4.0
    packID: FiltersAndTransformers
    packName: Filters And Transformers
    packPropagationLabels:
    - all
    prevname: ""
    propagationLabels: []
    toServerVersion: ""
dockerimage: demisto/python3:3.12.8.3296088
enabled: true
engineinfo: {}
mainengineinfo: {}
name: PadZeros
nativeimage:
- "8.8"
- "8.6"
pswd: ""
runas: DBotWeakRole
runonce: false
script: |
  register_module_line('PadZeros', 'start', __line__())
  CONSTANT_PACK_VERSION = '1.4.0'
  demisto.debug('pack id = FiltersAndTransformers, pack version = 1.4.0')



  def main():
      args: dict = demisto.args()

      s: str = str(args.get("value"))
      length: int = int(args.get("length", 0))
      demisto.results(s.zfill(length))


  if __name__ == "builtins":
      main()  # pragma: no cover

  register_module_line('PadZeros', 'end', __line__())
scripttarget: 0
subtype: python3
system: true
tags:
- transformer
- string
- number
type: python
