args:
- default: true
  description: Incident ID to get tasks from.
  name: inc_id
  required: true
- description: 'Comma-separated list of states. Possible values: New, InProgress,
    Completed, Waiting, Error, LoopError, Skipped, Blocked. (Leave empty to get all
    tasks).'
  isArray: true
  name: states
- description: The name of the task to search.
  name: name
- description: The tag to search.
  name: tag
comment: Get all tasks for a specific incident by the given state, name and/or tag.
commonfields:
  id: GetIncidentTasks
  version: -1
contentitemexportablefields:
  contentitemfields:
    definitionid: ""
    fromServerVersion: 6.10.0
    isoverridable: false
    itemVersion: 1.3.84
    packID: DemistoRESTAPI
    packName: Cortex REST API
    packPropagationLabels:
    - all
    prevname: ""
    propagationLabels: []
    toServerVersion: ""
enabled: true
engineinfo: {}
mainengineinfo: {}
name: GetIncidentTasks
outputs:
- contextPath: Tasks
  description: The entire task object.
- contextPath: Tasks.id
  description: Task ID.
  type: string
- contextPath: Tasks.name
  description: Task name.
  type: string
- contextPath: Tasks.type
  description: The type of the task (regular, condition, title, playbook, start).
  type: string
- contextPath: Tasks.owner
  description: Task owner.
  type: string
- contextPath: Tasks.state
  description: Task state (inprogress, Completed, WillNotBeExecuted, Error, LoopError,
    Waiting, Blocked, and empty string for not started).
  type: string
- contextPath: Tasks.scriptId
  description: Task related script (empty if manual).
  type: string
- contextPath: Tasks.startDate
  description: Task start date.
  type: unknown
- contextPath: Tasks.completedDate
  description: Task completed date.
  type: unknown
- contextPath: Tasks.dueDate
  description: Task due date (SLA).
  type: unknown
- contextPath: Tasks.parentPlaybookID
  description: Task parent playbook ID (in case the task is part of a sub-playbook).
  type: unknown
- contextPath: Tasks.completedBy
  description: Task completed by (username).
  type: string
pswd: ""
runas: DBotWeakRole
runonce: false
script: |
  // pack version: 1.3.84
  TASK_STATES = {
      "new": "",
      "inprogress": "inprogress",
      "completed": "Completed",
      "waiting": "Waiting",
      "error": "Error",
      "looperror": "LoopError",
      "skipped": "WillNotBeExecuted",
      "willnotbeexecuted": "WillNotBeExecuted",
      "blocked": "Blocked",
  }


  function getPlaybookTasks(tasks){
      var readyTasks = [];

      for (var i = 0; i < tasks.length; i++) {
          var task = tasks[i];

          if (task.type === "playbook" && task.subPlaybook) {
              var subPlaybookTasks = [];

              if (task.subPlaybook.tasks) {
                  for (var key in task.subPlaybook.tasks) {
                      if (task.subPlaybook.tasks.hasOwnProperty(key)) {
                          subPlaybookTasks.push(task.subPlaybook.tasks[key]);
                      }
                  }
              }

              var nestedTasks = getPlaybookTasks(subPlaybookTasks);
              readyTasks = readyTasks.concat(nestedTasks);
          }

          readyTasks.push(task);
      }

      return readyTasks;
  }


  function isTaskMatch(task, name, tag, states) {
      var taskTask = task.task || {};

      var nameMatch = name === null || name === undefined ||
          (taskTask.name && taskTask.name.toLowerCase() === name.toLowerCase());

      var tagMatch = tag === null || tag === undefined ||
          (taskTask.tags && taskTask.tags.indexOf(tag) !== -1);

      var stateMatch = !states || states.length === 0 ||
          (states.indexOf(task.state) !== -1);

      return nameMatch && tagMatch && stateMatch;
  }


  function getStates(states) {
      // If "error" is in the input list, add "loopError"
      if (states.indexOf("error") !== -1) {
          states.push("loopError");
      }

      var readyStates = [];

      for (var i = 0; i < states.length; i++) {
          var state = states[i];
          var systemState = TASK_STATES[state.toLowerCase()];

          if (systemState && readyStates.indexOf(systemState) === -1) {
              readyStates.push(systemState);
          }
      }

      // If no matches were found, return all values from TASK_STATES
      if (readyStates.length === 0) {
          for (var key in TASK_STATES) {
              if (TASK_STATES.hasOwnProperty(key)) {
                  var value = TASK_STATES[key];
                  if (readyStates.indexOf(value) === -1) {
                      readyStates.push(value);
                  }
              }
          }
      }

      return readyStates;
  }

  var name = args.name
  var tag = args.tag
  var inc_id = args.inc_id
  var states = getStates(argToList(args.states))

  var res = executeCommand('core-api-get', {
      uri: `/investigation/${inc_id}/workplan`});


  if (!isValidRes(res))
  {
      if(res[0].Contents){
            return {
                ContentsFormat: formats.markdown,
                Type: entryTypes.error,
                Contents: res[0].Contents
            };
      }
  }

  var tasks = undefined;
  if (
      res &&
      res[0] &&
      res[0].Contents &&
      res[0].Contents.response &&
      res[0].Contents.response.invPlaybook &&
      res[0].Contents.response.invPlaybook.tasks
  )
  {
      tasks = res[0].Contents.response.invPlaybook.tasks;


      if (tasks == undefined){
          return{
              Type: entryTypes.note,
              ReadableContentsFormat: formats.text,
              Contents: `Workplan for incident ${inc_id} has no tasks.`,
          };
      }

      allTasks = getPlaybookTasks(Object.values(tasks));


      var res = [];

      for (var i = 0; i < allTasks.length; i++) {
          var task = allTasks[i];

          if (isTaskMatch(task, name, tag, states)) {
              res.push({
                  id: task.id,
                  name: (task.task && task.task.name) || "",
                  type: task.type,
                  owner: task.assignee,
                  state: task.state,
                  scriptId: task.task && task.task.scriptId,
                  startDate: task.startDate,
                  dueDate: task.dueDate,
                  completedDate: task.completedDate,
                  parentPlaybookID: task.parentPlaybookID,
                  completedBy: task.completedBy
              });
          }
      }


      var ec = {'Tasks(val.id && val.id == obj.id)': res};


      return {
          Type: entryTypes.note,
          ReadableContentsFormat: formats.markdown,
          Contents: res,
          ContentsFormat: formats.json,
          HumanReadable: tableToMarkdown(`Incident #${inc_id} Playbook Tasks`, res, ["id", "name", "state", "owner", "scriptId"],removeNull=true),
          EntryContext: ec
      };

  }




  if (tasks == undefined){
      return{
          Type: entryTypes.note,
          ReadableContentsFormat: formats.text,
          Contents: `Workplan for incident ${inc_id} has no tasks.`,
      };
  }
