    propagationLabels: []
    toServerVersion: ""
dockerimage: demisto/python3:3.12.11.4095827
enabled: true
engineinfo: {}
mainengineinfo: {}
name: DT
nativeimage:
- "8.8"
- "8.6"
pswd: ""
runas: DBotWeakRole
runonce: false
script: |
  register_module_line('DT', 'start', __line__())
  CONSTANT_PACK_VERSION = '1.4.0'
  demisto.debug('pack id = FiltersAndTransformers, pack version = 1.4.0')



  args = demisto.args()
  value = args["value"]
  dt = args["dt"]

  res = demisto.dt(value, dt)
  return_results(encode_string_results(res))

  register_module_line('DT', 'end', __line__())
