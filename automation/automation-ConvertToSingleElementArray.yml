script: |
  register_module_line('ConvertToSingleElementArray', 'start', __line__())
  CONSTANT_PACK_VERSION = '1.4.0'
  demisto.debug('pack id = FiltersAndTransformers, pack version = 1.4.0')






  def main():
      args = demisto.args()
      value = args.get("value")
      if value and isinstance(value, list):
          demisto.results(value)
      elif value:
          demisto.results([value])
      else:
          demisto.results([])




  if __name__ in ("__main__", "__builtin__", "builtins"):
      main()

  register_module_line('ConvertToSingleElementArray', 'end', __line__())
