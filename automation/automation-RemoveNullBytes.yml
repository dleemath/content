script: |
  register_module_line('RemoveNullBytes', 'start', __line__())
  CONSTANT_PACK_VERSION = '1.4.0'
  demisto.debug('pack id = FiltersAndTransformers, pack version = 1.4.0')




  def removenullbytes(value):
      if isinstance(value, str):
          result = value.replace("\x00", "")
      else:
          return "error"
      return result


  def main():
      value = demisto.args()["value"]
      result = removenullbytes(value)
      if result == "error":
          return_error("This transformer applies only to string")
      return_results(result)


  if __name__ == "__builtin__" or __name__ == "builtins":
      main()

  register_module_line('RemoveNullBytes', 'end', __line__())
