comment: Get the Server URL.
commonfields:
  id: GetServerURL
  version: -1
contentitemexportablefields:
  contentitemfields:
    definitionid: ""
    fromServerVersion: 5.0.0
    isoverridable: false
    itemVersion: 1.20.24
    packID: CommonScripts
    packName: Common Scripts
    packPropagationLabels:
    - all
    prevname: ""
    propagationLabels: []
    toServerVersion: ""
enabled: true
engineinfo: {}
mainengineinfo: {}
name: GetServerURL
outputs:
- contextPath: ServerURL.Host
  description: The server host name.
  type: String
- contextPath: ServerURL.Port
  description: The server port.
  type: Number
- contextPath: ServerURL.Scheme
  description: The server scheme.
  type: String
- contextPath: ServerURL.URL
  description: The server full URL.
  type: String
pswd: ""
runas: DBotWeakRole
runonce: false
script: |-
  // pack version: 1.20.24
    function parseUrl(url) {
        match = url.match(urlRegex);

        return match ? {
            shcema: url.match(/^(https?):/)[1],
            hostname: match[2],
            port: match[3] || '',
        } : null;
    }

    urls = demistoUrls();
    server_url = urls['server'].toString();


    result = parseUrl(server_url);

    ec = {
        'ServerURL': {
            Scheme: result.shcema,
            Host: result.hostname,
            Port: Number(result.port),
            URL: server_url
        }
    }

    return {
        Type: entryTypes.note,
        Contents: server_url,
        ContentsFormat: formats.note,
        HumanReadable: server_url,
        ReadableContentsFormat: formats.markdown,
        EntryContext: ec
    };
scripttarget: 0
system: true
tags: []
type: javascript
